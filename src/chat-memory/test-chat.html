<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Teste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #444;
            border-bottom: none;
            background: #252525;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }

        .message.user {
            background: #264f78;
            text-align: right;
            margin-left: 50px;
        }

        .message.assistant {
            background: #2d5a3d;
            margin-right: 50px;
        }

        .message.error {
            background: #5a2d2d;
            margin-right: 50px;
        }

        .message strong {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .input-box {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #444;
            background: #1e1e1e;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #444;
            background: #333;
            color: #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
        }

        input:focus {
            outline: none;
            border-color: #0f9;
        }

        button {
            padding: 10px 20px;
            background: #0f9;
            color: #1e1e1e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0d7;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .loading {
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-box" id="chatBox"></div>
        <div class="input-box">
            <input
                type="text"
                id="messageInput"
                placeholder="Digite sua mensagem (Enter para enviar)..."
                autocomplete="off"
            >
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(sender, text, type = 'user') {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            messageEl.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatBox.appendChild(messageEl);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();

            if (!text) return;

            // Limpa input
            messageInput.value = '';
            sendBtn.disabled = true;

            // Mostra mensagem do usuário
            addMessage('Você', text, 'user');

            // Mostra carregamento
            addMessage('Assistente', 'Aguardando resposta...', 'loading');

            try {
                // Aqui você conectaria com sua pipeline
                // Por enquanto, simula uma resposta
                const response = await simulateResponse(text);

                // Remove mensagem de carregamento
                const lastMessage = chatBox.lastChild;
                lastMessage.remove();

                // Mostra resposta
                addMessage('Assistente', response, 'assistant');
            } catch (err) {
                const lastMessage = chatBox.lastChild;
                lastMessage.remove();
                addMessage('Erro', String(err), 'error');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Simula resposta (substitua com sua pipeline real)
        async function simulateResponse(message) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(`Echo: "${message}"`);
                }, 500);
            });
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus inicial
        messageInput.focus();
    </script>
</body>
</html>
